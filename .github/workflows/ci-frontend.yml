name: CI · Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  validate:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (root)
        working-directory: .
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ci-dummy
          VITE_FIREBASE_AUTH_DOMAIN: ci-dummy
          VITE_FIREBASE_PROJECT_ID: ci-dummy
          VITE_FIREBASE_STORAGE_BUCKET: ci-dummy
          VITE_FIREBASE_MESSAGING_SENDER_ID: ci-dummy
          VITE_FIREBASE_APP_ID: ci-dummy
        run: npm run build
