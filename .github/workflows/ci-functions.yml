name: CI · Functions

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - ".github/workflows/ci-functions.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "functions/**"
      - ".github/workflows/ci-functions.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  validate:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (root)
        working-directory: .
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
